<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Africa's Growth, Visualised · metro.ad</title>
<meta name="description" content="22 of the world's 28 fastest-growing cities are African. A free mini widget from Met Road.">
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#b3760b;--accent2:#8f5e09;--muted:#5c6267;--bg:#f7f7f8;--surface:#fdfdfd;
--border:rgba(101,70,31,.14);--text:#13171a;--op-bg:#e9ebec;--africa:#d0d6db;--africa-line:#b88d4c;--faint:#898f95}
*{cursor:default;box-sizing:border-box;margin:0;padding:0}
a,button{cursor:pointer}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex}
.mw{position:relative;flex:1 1 auto;display:flex;flex-direction:column;background:var(--surface);
border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.mw-body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;padding:12px 14px 6px;min-height:0;text-align:center}
.mw-eyebrow{font-size:9.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.mw-brand{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:6px;
padding:7px 10px;background:var(--op-bg);border-top:1px solid var(--border);text-decoration:none;
font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.01em;transition:background .15s}
.mw-brand:hover{background:#dde0e3}
.mw-brand .bdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
.mw-brand .arw{color:var(--faint);font-weight:700}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:210px;margin:7px auto 0}
.g{width:15px;height:15px;border-radius:4px;background:#dbdee1;border:1px solid var(--border);
transform:scale(.55);opacity:.45;transition:transform .4s cubic-bezier(.2,1,.3,1),background .4s,opacity .4s}
.g.on{background:var(--accent);border-color:var(--accent2);transform:scale(1);opacity:1}
.hl{font-size:27px;font-weight:800;letter-spacing:-.02em;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums}
.hs{font-size:11.5px;font-weight:600;color:var(--text);line-height:1.35;margin-top:5px;max-width:25ch;margin-left:auto;margin-right:auto}
.tog{display:flex;gap:5px;justify-content:center;margin-top:8px}
.tg{font-family:inherit;font-size:9.5px;font-weight:700;padding:4px 9px;border-radius:999px;
border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:background .15s,color .15s,border-color .15s}
.tg.on{background:var(--accent);border-color:var(--accent);color:#fff}
</style><link rel="canonical" href="https://metro.ad/widgets/growth-dots.html">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#f6f6f7">
</head>
<body>
<div class="mw">
  <div class="mw-body">
    <div class="mw-eyebrow">📈 The growth frontier</div>
    <div class="hl" id="hl">22 of 28</div>
    <div class="hs" id="hs">of the world's fastest-growing <b>cities</b> are African</div>
    <div class="grid" id="grid"></div>
    <div class="tog">
      <button class="tg on" id="tCity" type="button">Cities</button>
      <button class="tg" id="tEco" type="button">Economies</button>
    </div>
  </div>
  <a class="mw-brand" href="https://metro.ad" target="_blank" rel="noopener">
    <span class="bdot"></span>metro.ad<span class="arw">→</span>
  </a>
</div>
<script>(function(){
 var MODES={city:{a:22,b:28,l:'cities'},eco:{a:12,b:20,l:'economies'}};
 var grid=document.getElementById('grid'), hl=document.getElementById('hl'), hs=document.getElementById('hs');
 var tc=document.getElementById('tCity'), te=document.getElementById('tEco'), cur='city', tid=null;
 function render(m){
   var M=MODES[m]; cur=m;
   hl.textContent=M.a+' of '+M.b;
   hs.innerHTML="of the world's fastest-growing <b>"+M.l+"</b> are African";
   tc.classList.toggle('on',m==='city'); te.classList.toggle('on',m==='eco');
   grid.innerHTML='';
   var cells=[];
   for(var i=0;i<M.b;i++){var d=document.createElement('span');d.className='g';grid.appendChild(d);cells.push(d);}
   if(tid)clearInterval(tid);
   var k=0;
   tid=setInterval(function(){
     if(k>=M.a){clearInterval(tid);return;}
     cells[k].classList.add('on'); k++;
   },62);
 }
 render('city');
 tc.addEventListener('click',function(){render('city');});
 te.addEventListener('click',function(){render('eco');});
})();</script>
</body></html>
