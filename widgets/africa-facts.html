<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Africa Fact Ticker · metro.ad</title>
<meta name="description" content="Eight things the map never told you about Africa. A free mini widget from Met Road.">
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#b3760b;--accent2:#8f5e09;--muted:#5c6267;--bg:#f7f7f8;--surface:#fdfdfd;
--border:rgba(101,70,31,.14);--text:#13171a;--op-bg:#e9ebec;--africa:#d0d6db;--africa-line:#b88d4c;--faint:#898f95}
*{cursor:default;box-sizing:border-box;margin:0;padding:0}
a,button{cursor:pointer}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex}
.mw{position:relative;flex:1 1 auto;display:flex;flex-direction:column;background:var(--surface);
border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.mw-body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;padding:12px 14px 6px;min-height:0;text-align:center}
.mw-eyebrow{font-size:9.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.mw-brand{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:6px;
padding:7px 10px;background:var(--op-bg);border-top:1px solid var(--border);text-decoration:none;
font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.01em;transition:background .15s}
.mw-brand:hover{background:#dde0e3}
.mw-brand .bdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
.mw-brand .arw{color:var(--faint);font-weight:700}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.slide{opacity:0;transform:translateY(9px);transition:opacity .4s ease,transform .45s cubic-bezier(.2,1,.3,1)}
.slide.on{opacity:1;transform:none}
.emo{font-size:24px;line-height:1;margin-bottom:6px}
.num{font-size:31px;font-weight:800;letter-spacing:-.025em;line-height:1.02;color:var(--accent)}
.txt{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.36;margin-top:6px;max-width:23ch;margin-left:auto;margin-right:auto}
.bars{display:flex;gap:3px;justify-content:center;margin-top:10px}
.bp{width:13px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;position:relative}
.bp i{position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:left}
.bp.on i{animation:fill 4.4s linear forwards}
.bp.done i{transform:scaleX(1)}
@keyframes fill{to{transform:scaleX(1)}}
</style><link rel="canonical" href="https://metro.ad/widgets/africa-facts.html">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#f6f6f7">
</head>
<body>
<div class="mw">
  <div class="mw-body">
    <div class="mw-eyebrow">🌍 Did you know?</div>
    <div class="slide on" id="slide">
      <div class="emo" id="emo">👥</div>
      <div class="num" id="num">1.58 billion</div>
      <div class="txt" id="txt">people call Africa home</div>
    </div>
    <div class="bars" id="bars"></div>
  </div>
  <a class="mw-brand" href="https://metro.ad" target="_blank" rel="noopener">
    <span class="bdot"></span>metro.ad<span class="arw">→</span>
  </a>
</div>
<script>(function(){
 var F=[{n:'1.58 billion',t:'people call Africa home',e:'👥'},{n:'19.5 years',t:'median age — the youngest continent on Earth',e:'🌱'},{n:'30.4M km²',t:'big enough to hold the USA, China, India, Europe &amp; Japan',e:'🗺️'},{n:'22 of 28',t:'of the world\'s fastest-growing cities are African',e:'🏙️'},{n:'12 of 20',t:'of the world\'s fastest-growing economies are African',e:'📈'},{n:'60%',t:'of the world\'s best solar resource sits in Africa',e:'☀️'},{n:'722 million',t:'already live in African cities',e:'🚇'},{n:'54 nations',t:'in the world\'s largest free-trade area',e:'🤝'}], i=0;
 var s=document.getElementById('slide'), emo=document.getElementById('emo'),
     num=document.getElementById('num'), txt=document.getElementById('txt'), bars=document.getElementById('bars');
 F.forEach(function(){var b=document.createElement('span');b.className='bp';b.innerHTML='<i></i>';bars.appendChild(b);});
 function mark(k){[].forEach.call(bars.children,function(b,n){b.className='bp'+(n===k?' on':(n<k?' done':''));});}
 function show(k){
   s.classList.remove('on');
   setTimeout(function(){
     emo.textContent=F[k].e; num.innerHTML=F[k].n; txt.innerHTML=F[k].t;
     s.classList.add('on'); mark(k);
   },330);
 }
 mark(0);
 setInterval(function(){ i=(i+1)%F.length; show(i); },4400);
 s.addEventListener('click',function(){ i=(i+1)%F.length; show(i); });
})();</script>
</body></html>
